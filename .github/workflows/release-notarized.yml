name: Release Notarized

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Marketing version, for example 0.1.3"
        required: true
        default: "0.1.3"
      build:
        description: "Build number"
        required: true
        default: "4"
      tag:
        description: "Release tag"
        required: true
        default: "v0.1.3"
      bundle_id:
        description: "Bundle identifier"
        required: true
        default: "com.local.maccleankit"
      prerelease:
        description: "Mark the GitHub release as prerelease"
        type: boolean
        required: true
        default: false

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Import Developer ID certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.MACOS_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          if [[ -z "$CERTIFICATE_BASE64" || -z "$CERTIFICATE_PASSWORD" || -z "$KEYCHAIN_PASSWORD" ]]; then
            echo "Configure MACOS_CERTIFICATE_BASE64, MACOS_CERTIFICATE_PASSWORD, and MACOS_KEYCHAIN_PASSWORD secrets." >&2
            exit 2
          fi

          CERTIFICATE_PATH="$RUNNER_TEMP/developer-id.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          echo "$CERTIFICATE_BASE64" | base64 -D > "$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning

      - name: Store notarytool credentials
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          set -euo pipefail
          if [[ -z "$APPLE_ID" || -z "$APPLE_TEAM_ID" || -z "$APPLE_APP_SPECIFIC_PASSWORD" ]]; then
            echo "Configure APPLE_ID, APPLE_TEAM_ID, and APPLE_APP_SPECIFIC_PASSWORD secrets." >&2
            exit 2
          fi
          xcrun notarytool store-credentials "maccleankit-notary" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD"

      - name: Build, sign, notarize, and package
        env:
          VERSION: ${{ inputs.version }}
          BUILD: ${{ inputs.build }}
          BUNDLE_ID: ${{ inputs.bundle_id }}
          CODESIGN_IDENTITY: ${{ secrets.DEVELOPER_ID_APPLICATION }}
          NOTARY_PROFILE: maccleankit-notary
          DOWNLOAD_URL: https://github.com/${{ github.repository }}/releases/download/${{ inputs.tag }}/MacCleanKit.app.zip
          SPARKLE_FEED_URL: ${{ vars.SPARKLE_FEED_URL }}
          SPARKLE_PUBLIC_ED_KEY: ${{ secrets.SPARKLE_PUBLIC_ED_KEY }}
        run: |
          set -euo pipefail
          if [[ -z "$CODESIGN_IDENTITY" ]]; then
            echo "Configure DEVELOPER_ID_APPLICATION secret, for example: Developer ID Application: Name (TEAMID)." >&2
            exit 2
          fi
          Scripts/release-notarized.sh

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          PRERELEASE_FLAG=""
          if [[ "${{ inputs.prerelease }}" == "true" ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "${{ inputs.tag }}" \
            dist/MacCleanKit.dmg \
            dist/MacCleanKit.app.zip \
            dist/appcast-template.xml \
            --target "$GITHUB_SHA" \
            --title "MacCleanKit ${{ inputs.version }}" \
            --notes "Developer ID signed and notarized MacCleanKit ${{ inputs.version }} (${{ inputs.build }})." \
            $PRERELEASE_FLAG
